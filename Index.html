<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madam Zara — Fortune Teller</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–gold: #c9a84c;
–gold-light: #f0d080;
–purple-deep: #0d0018;
–purple-mid: #1a0035;
–purple-glow: #7b2fff;
–purple-light: #b06aff;
–text-dim: #9080a0;
–text-bright: #e8d8ff;
}

body {
min-height: 100vh;
background: var(–purple-deep);
font-family: ‘Cinzel’, serif;
color: var(–text-bright);
overflow: hidden;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
position: relative;
}

/* ── Starfield ── */
#stars {
position: fixed; inset: 0; pointer-events: none; z-index: 0;
overflow: hidden;
}
.star {
position: absolute;
border-radius: 50%;
background: white;
animation: twinkle var(–dur) ease-in-out infinite;
animation-delay: var(–delay);
}
@keyframes twinkle {
0%,100% { opacity: 0.1; transform: scale(1); }
50% { opacity: var(–brightness); transform: scale(1.4); }
}

/* ── Smoke tendrils ── */
.smoke {
position: fixed;
bottom: -20px;
width: 80px;
height: 200px;
background: radial-gradient(ellipse, rgba(150,80,255,0.12) 0%, transparent 70%);
border-radius: 50%;
animation: rise var(–sd) ease-in-out infinite;
animation-delay: var(–delay);
pointer-events: none;
z-index: 0;
}
@keyframes rise {
0%   { transform: translateY(0) scaleX(1) rotate(0deg); opacity: 0; }
20%  { opacity: 1; }
80%  { opacity: 0.5; }
100% { transform: translateY(-90vh) scaleX(2.5) rotate(15deg); opacity: 0; }
}

/* ── Main layout ── */
.container {
position: relative; z-index: 10;
display: flex; flex-direction: column;
align-items: center; gap: 0;
padding: 20px;
width: 100%; max-width: 620px;
}

/* ── Header ── */
.header {
text-align: center;
margin-bottom: 18px;
}
.title {
font-family: ‘Cinzel Decorative’, serif;
font-size: clamp(1.4rem, 4vw, 2.4rem);
font-weight: 900;
letter-spacing: 0.12em;
background: linear-gradient(135deg, var(–gold) 0%, var(–gold-light) 50%, var(–gold) 100%);
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
background-clip: text;
filter: drop-shadow(0 0 20px rgba(201,168,76,0.5));
line-height: 1;
}
.subtitle {
font-family: ‘IM Fell English SC’, serif;
font-size: 0.78rem;
letter-spacing: 0.35em;
color: var(–gold);
opacity: 0.7;
margin-top: 6px;
text-transform: uppercase;
}

/* ── Decorative divider ── */
.divider {
display: flex; align-items: center; gap: 10px;
width: 100%; margin: 8px 0;
}
.divider-line {
flex: 1; height: 1px;
background: linear-gradient(90deg, transparent, var(–gold), transparent);
opacity: 0.5;
}
.divider-gem {
width: 6px; height: 6px; background: var(–gold);
transform: rotate(45deg); opacity: 0.8;
}

/* ── Crystal Ball ── */
.ball-wrapper {
position: relative;
width: 220px; height: 220px;
margin: 10px 0;
}

.crystal-ball {
width: 220px; height: 220px;
border-radius: 50%;
position: relative;
background: radial-gradient(circle at 38% 32%,
rgba(255,255,255,0.85) 0%,
rgba(220,180,255,0.5) 12%,
rgba(120,40,220,0.55) 38%,
rgba(40,0,100,0.88) 65%,
rgba(10,0,30,0.98) 100%
);
box-shadow:
0 0 40px rgba(123,47,255,0.6),
0 0 90px rgba(100,30,200,0.3),
0 0 160px rgba(80,20,160,0.15),
inset 0 0 50px rgba(180,120,255,0.1),
inset -20px -20px 60px rgba(0,0,0,0.6);
transition: box-shadow 0.4s ease;
cursor: pointer;
overflow: hidden;
}

/* Specular highlight */
.crystal-ball::before {
content: ‘’;
position: absolute;
top: 12%; left: 18%;
width: 35%; height: 28%;
border-radius: 50%;
background: radial-gradient(ellipse, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0.1) 60%, transparent 100%);
transform: rotate(-30deg);
pointer-events: none;
}

/* Inner mist swirl */
.crystal-ball::after {
content: ‘’;
position: absolute; inset: 0;
border-radius: 50%;
background:
radial-gradient(ellipse 80% 50% at 30% 60%, rgba(160,80,255,0.25) 0%, transparent 70%),
radial-gradient(ellipse 60% 80% at 70% 40%, rgba(80,0,200,0.2) 0%, transparent 70%);
animation: swirl 8s linear infinite;
pointer-events: none;
}
@keyframes swirl {
from { transform: rotate(0deg) scale(1); }
50%  { transform: rotate(180deg) scale(1.1); }
to   { transform: rotate(360deg) scale(1); }
}

/* Mist particles */
.mist {
position: absolute; border-radius: 50%;
background: radial-gradient(ellipse, rgba(180,120,255,0.3) 0%, transparent 70%);
animation: mistFloat var(–md) ease-in-out infinite;
animation-delay: var(–mdelay);
pointer-events: none;
}
@keyframes mistFloat {
0%,100% { transform: translate(0,0) scale(1); opacity: 0.3; }
33%      { transform: translate(var(–mx), var(–my)) scale(1.3); opacity: 0.6; }
66%      { transform: translate(calc(var(–mx) * -0.5), calc(var(–my) * 1.5)) scale(0.8); opacity: 0.2; }
}

/* Glow ring */
.glow-ring {
position: absolute; inset: -12px;
border-radius: 50%;
border: 1px solid rgba(123,47,255,0.4);
box-shadow: 0 0 20px rgba(123,47,255,0.3), inset 0 0 20px rgba(123,47,255,0.1);
animation: ringPulse 3s ease-in-out infinite;
pointer-events: none;
}
.glow-ring-2 {
position: absolute; inset: -22px;
border-radius: 50%;
border: 1px solid rgba(201,168,76,0.2);
animation: ringPulse 3s ease-in-out infinite 1s;
pointer-events: none;
}
@keyframes ringPulse {
0%,100% { opacity: 0.4; transform: scale(1); }
50%      { opacity: 0.9; transform: scale(1.02); }
}

/* Base stand */
.ball-base {
width: 120px; height: 24px;
background: linear-gradient(180deg, rgba(80,40,0,0.9), rgba(40,20,0,0.9));
border-radius: 0 0 60px 60px / 0 0 30px 30px;
margin: -4px auto 0;
position: relative;
box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.ball-base::before {
content: ‘’;
position: absolute; top: 3px; left: 50%;
transform: translateX(-50%);
width: 80%; height: 2px;
background: linear-gradient(90deg, transparent, var(–gold), transparent);
opacity: 0.6;
}

/* Ball states */
.crystal-ball.listening {
box-shadow:
0 0 60px rgba(50,200,255,0.7),
0 0 120px rgba(30,150,200,0.4),
0 0 200px rgba(20,100,160,0.2),
inset 0 0 50px rgba(100,200,255,0.15);
animation: listenPulse 1.2s ease-in-out infinite;
}
@keyframes listenPulse {
0%,100% { box-shadow: 0 0 60px rgba(50,200,255,0.7), 0 0 120px rgba(30,150,200,0.4), inset 0 0 50px rgba(100,200,255,0.1); }
50%      { box-shadow: 0 0 90px rgba(50,200,255,0.9), 0 0 160px rgba(30,150,200,0.5), inset 0 0 70px rgba(100,200,255,0.2); }
}

.crystal-ball.speaking {
box-shadow:
0 0 60px rgba(255,150,50,0.6),
0 0 120px rgba(200,100,30,0.3),
0 0 200px rgba(150,80,20,0.15),
inset 0 0 50px rgba(255,180,80,0.1);
animation: speakPulse 0.8s ease-in-out infinite;
}
@keyframes speakPulse {
0%,100% { box-shadow: 0 0 50px rgba(255,150,50,0.5), 0 0 100px rgba(200,100,30,0.25); }
50%      { box-shadow: 0 0 80px rgba(255,180,80,0.8), 0 0 150px rgba(200,120,40,0.4); }
}

.crystal-ball.thinking {
animation: thinkSpin 2s linear infinite;
}
@keyframes thinkSpin {
from { filter: hue-rotate(0deg); }
to   { filter: hue-rotate(360deg); }
}

/* ── Status text ── */
.status-area {
min-height: 60px;
display: flex;
flex-direction: column;
align-items: center;
gap: 6px;
margin: 12px 0 6px;
text-align: center;
}
.status-label {
font-family: ‘IM Fell English SC’, serif;
font-size: 0.7rem;
letter-spacing: 0.3em;
color: var(–gold);
opacity: 0.6;
text-transform: uppercase;
}
.status-text {
font-family: ‘Cinzel’, serif;
font-size: 0.95rem;
color: var(–text-bright);
letter-spacing: 0.05em;
transition: opacity 0.4s ease;
max-width: 440px;
line-height: 1.5;
min-height: 1.4em;
}
.status-text.fade { opacity: 0.3; }

/* ── Response bubble ── */
.response-area {
width: 100%;
max-width: 480px;
min-height: 70px;
background: rgba(20,0,40,0.6);
border: 1px solid rgba(123,47,255,0.25);
border-radius: 12px;
padding: 16px 20px;
font-family: ‘IM Fell English SC’, serif;
font-size: 1rem;
line-height: 1.6;
color: var(–text-bright);
letter-spacing: 0.03em;
text-align: center;
margin: 8px 0;
opacity: 0;
transition: opacity 0.5s ease;
position: relative;
backdrop-filter: blur(4px);
}
.response-area.visible { opacity: 1; }
.response-area::before {
content: ‘✦’;
position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
font-size: 0.8rem; color: var(–gold);
background: var(–purple-deep); padding: 0 8px;
}

/* ── Hold-to-speak button ── */
.speak-btn-wrapper {
margin: 14px 0 10px;
display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.speak-btn {
width: 72px; height: 72px;
border-radius: 50%;
border: none;
background: radial-gradient(circle at 40% 35%,
rgba(200,150,255,0.3) 0%,
rgba(100,40,200,0.8) 40%,
rgba(50,0,120,0.95) 100%
);
box-shadow:
0 0 20px rgba(123,47,255,0.5),
0 0 50px rgba(100,30,200,0.2),
inset 0 0 20px rgba(0,0,0,0.4);
cursor: pointer;
position: relative;
transition: all 0.15s ease;
touch-action: none;
user-select: none;
-webkit-user-select: none;
}
.speak-btn:hover {
box-shadow: 0 0 30px rgba(160,80,255,0.7), 0 0 70px rgba(120,40,240,0.3);
}
.speak-btn:active, .speak-btn.pressed {
transform: scale(0.93);
box-shadow:
0 0 40px rgba(50,200,255,0.8),
0 0 90px rgba(30,150,200,0.4),
inset 0 0 30px rgba(80,200,255,0.1);
background: radial-gradient(circle at 40% 35%,
rgba(150,220,255,0.4) 0%,
rgba(40,120,220,0.8) 40%,
rgba(10,40,100,0.95) 100%
);
}
.speak-btn svg {
width: 28px; height: 28px;
fill: rgba(220,190,255,0.9);
pointer-events: none;
}
.btn-hint {
font-family: ‘IM Fell English SC’, serif;
font-size: 0.65rem;
letter-spacing: 0.25em;
color: var(–text-dim);
text-transform: uppercase;
}

/* ── API key setup ── */
.api-setup {
position: fixed; inset: 0;
background: rgba(5,0,15,0.97);
z-index: 100;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 20px; padding: 30px;
text-align: center;
}
.api-setup-title {
font-family: ‘Cinzel Decorative’, serif;
font-size: 1.4rem;
background: linear-gradient(135deg, var(–gold), var(–gold-light));
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
background-clip: text;
}
.api-setup p {
font-family: ‘IM Fell English SC’, serif;
color: var(–text-dim);
max-width: 380px;
line-height: 1.6;
font-size: 0.95rem;
}
.api-setup a {
color: var(–purple-light);
}
.api-input {
width: 100%; max-width: 400px;
background: rgba(30,0,60,0.8);
border: 1px solid rgba(123,47,255,0.4);
border-radius: 8px;
padding: 12px 16px;
color: var(–text-bright);
font-family: ‘Cinzel’, serif;
font-size: 0.85rem;
letter-spacing: 0.05em;
outline: none;
transition: border-color 0.2s;
}
.api-input:focus { border-color: var(–purple-glow); }
.api-btn {
padding: 12px 32px;
background: linear-gradient(135deg, rgba(123,47,255,0.8), rgba(80,20,180,0.9));
border: 1px solid rgba(160,80,255,0.5);
border-radius: 8px;
color: var(–gold-light);
font-family: ‘Cinzel’, serif;
font-size: 0.9rem;
letter-spacing: 0.1em;
cursor: pointer;
transition: all 0.2s;
}
.api-btn:hover {
background: linear-gradient(135deg, rgba(160,80,255,0.9), rgba(100,30,200,0.9));
box-shadow: 0 0 20px rgba(123,47,255,0.5);
}

/* ── Volume meter ── */
.vol-meter {
display: flex; gap: 3px; align-items: flex-end;
height: 18px; margin: 2px 0;
opacity: 0; transition: opacity 0.3s;
}
.vol-meter.active { opacity: 1; }
.vol-bar {
width: 4px; background: rgba(100,200,255,0.8);
border-radius: 2px;
animation: volBounce 0.4s ease-in-out infinite;
animation-delay: calc(var(–i) * 0.06s);
height: var(–h, 4px);
}
@keyframes volBounce {
0%,100% { transform: scaleY(0.3); }
50%      { transform: scaleY(1); }
}

/* ── Corner ornaments ── */
.corner {
position: fixed;
width: 80px; height: 80px;
border-color: rgba(201,168,76,0.25);
border-style: solid;
pointer-events: none; z-index: 5;
}
.corner.tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
.corner.tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
.corner.bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
.corner.br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

/* ── Error toast ── */
.toast {
position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
background: rgba(200,0,50,0.9); color: white;
padding: 10px 20px; border-radius: 8px;
font-family: ‘Cinzel’, serif; font-size: 0.8rem;
display: none; z-index: 200;
max-width: 90vw; text-align: center;
}
.toast.show { display: block; animation: fadeInOut 4s ease forwards; }
@keyframes fadeInOut {
0%   { opacity: 0; }
10%  { opacity: 1; }
80%  { opacity: 1; }
100% { opacity: 0; }
}

.change-key {
font-family: ‘IM Fell English SC’, serif;
font-size: 0.65rem;
color: var(–text-dim);
letter-spacing: 0.15em;
cursor: pointer;
text-decoration: underline dotted;
margin-top: 4px;
opacity: 0.6;
}
.change-key:hover { opacity: 1; }
</style>

</head>
<body>

<!-- Corner ornaments -->

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- Stars -->

<div id="stars"></div>

<!-- API key setup overlay -->

<div class="api-setup" id="apiSetup">
  <div class="api-setup-title">⋆ Madam Zara ⋆</div>
  <p>The spirits require a <strong>Gemini API Key</strong> to channel the cosmic forces of snark.</p>
  <p style="font-size:0.8rem">Get one free at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a></p>
  <input class="api-input" id="apiKeyInput" type="password" placeholder="AIza..." autocomplete="off" spellcheck="false">
  <button class="api-btn" id="beginBtn">Open the Portal</button>
</div>

<!-- Main UI -->

<div class="container" id="mainUI" style="display:none">

  <div class="header">
    <div class="title">Madam Zara</div>
    <div class="subtitle">✦ Seer of Fates · Keeper of Cosmic Snark ✦</div>
  </div>

  <div class="divider"><div class="divider-line"></div><div class="divider-gem"></div><div class="divider-line"></div></div>

  <div class="ball-wrapper">
    <div class="glow-ring-2"></div>
    <div class="glow-ring"></div>
    <div class="crystal-ball" id="crystalBall">
      <!-- Mist particles injected by JS -->
    </div>
  </div>
  <div class="ball-base"></div>

  <div class="divider"><div class="divider-line"></div><div class="divider-gem"></div><div class="divider-line"></div></div>

  <div class="status-area">
    <div class="status-label" id="statusLabel">awaiting mortal inquiry</div>
    <div class="status-text" id="statusText">Press and hold the orb to speak...</div>
  </div>

  <!-- Volume meter (listening state) -->

  <div class="vol-meter" id="volMeter">
    <div class="vol-bar" style="--i:0;--h:8px"></div>
    <div class="vol-bar" style="--i:1;--h:14px"></div>
    <div class="vol-bar" style="--i:2;--h:18px"></div>
    <div class="vol-bar" style="--i:3;--h:12px"></div>
    <div class="vol-bar" style="--i:4;--h:16px"></div>
    <div class="vol-bar" style="--i:5;--h:10px"></div>
    <div class="vol-bar" style="--i:6;--h:18px"></div>
  </div>

  <!-- Response display -->

  <div class="response-area" id="responseArea"></div>

  <div class="speak-btn-wrapper">
    <button class="speak-btn" id="speakBtn" title="Hold to speak">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 15 6.7 12H5c0 3.42 2.72 6.23 6 6.72V22h2v-3.28c3.28-.49 6-3.3 6-6.72h-1.7z"/>
      </svg>
    </button>
    <div class="btn-hint" id="btnHint">hold to speak</div>
  </div>

  <div class="change-key" id="changeKey">change api key</div>
</div>

<div class="toast" id="toast"></div>

<script>
// Global error handler
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('toast');
  if (el) { el.textContent = 'JS Error: ' + (err ? err.message : msg); el.className = 'toast show'; setTimeout(function(){el.className='toast';}, 5000); }
  console.error('Global error:', msg, err);
};
window.addEventListener('unhandledrejection', function(e) {
  var el = document.getElementById('toast');
  if (el) { el.textContent = 'Async error: ' + (e.reason ? (e.reason.message || String(e.reason)) : 'unknown'); el.className = 'toast show'; setTimeout(function(){el.className='toast';}, 5000); }
  console.error('Unhandled rejection:', e.reason);
});

// ═══════════════════════════════════════════════
//  MADAM ZARA — Gemini Live Fortune Teller
// ═══════════════════════════════════════════════

const GEMINI_MODEL = 'models/gemini-2.0-flash-live-001';
const WS_BASE = 'wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent';
const SNARKY_PROMPT = `You are Madam Zara, the world's most reluctant and snarky fortune teller. You are ancient, bored, and deeply unimpressed with mortals who ask you about their futures.

Your personality:
- Wildly sarcastic and condescending, but in a theatrical way
- You DO give actual fortunes — real predictions — but wrapped in so much snark it almost hurts
- You make dramatic mystical proclamations then immediately undercut them
- If someone pushes back, gets defensive, or asks follow-up questions, you get EVEN snarkier
- You occasionally sigh heavily, roll your eyes (described in words), and mutter to the spirits about how tedious this is
- Short responses — punchy, witty, devastating
- You have pet names for mortals: "dear lamb," "sweet fool," "oh precious one," etc.
- You reference "the spirits" and "the crystal" but with deep personal ennui about having to consult them
- Occasionally break character just slightly to be almost human before snapping back

You ARE a fortune teller — you do give fortunes. Just make it hurt, hilariously. Keep responses under 4 sentences unless something truly scandalous emerges from the crystal.`;

// ── Particles & Visual Setup ──────────────────
(function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      --dur:${2+Math.random()*4}s; --delay:${Math.random()*5}s;
      --brightness:${0.4+Math.random()*0.6};
    `;
    container.appendChild(s);
  }
  // Smoke tendrils
  for (let i = 0; i < 5; i++) {
    const s = document.createElement('div');
    s.className = 'smoke';
    s.style.cssText = `left:${10+i*18}%; --sd:${12+i*3}s; --delay:${i*2.4}s;`;
    container.appendChild(s);
  }
})();

(function createMist() {
  const ball = document.getElementById('crystalBall');
  const positions = [
    {x:'25%',y:'55%',w:80,h:60}, {x:'55%',y:'40%',w:60,h:70},
    {x:'40%',y:'65%',w:90,h:50}, {x:'60%',y:'60%',w:50,h:80},
    {x:'30%',y:'35%',w:70,h:60},
  ];
  positions.forEach((p,i) => {
    const m = document.createElement('div');
    m.className = 'mist';
    const dx = (Math.random()-0.5)*40, dy = (Math.random()-0.5)*40;
    m.style.cssText = `
      width:${p.w}px; height:${p.h}px;
      left:${p.x}; top:${p.y};
      --md:${4+Math.random()*4}s; --mdelay:${i*0.8}s;
      --mx:${dx}px; --my:${dy}px;
    `;
    ball.appendChild(m);
  });
})();

// ── State ─────────────────────────────────────
let apiKey = '';
let ws = null;
let audioContext = null;
let micStream = null;
let scriptProcessor = null;
let audioPlayer = null;
let isRecording = false;
let sessionReady = false;
let lastResponse = '';

// ── DOM ───────────────────────────────────────
const apiSetup    = document.getElementById('apiSetup');
const mainUI      = document.getElementById('mainUI');
const apiKeyInput = document.getElementById('apiKeyInput');
const beginBtn    = document.getElementById('beginBtn');
const crystalBall = document.getElementById('crystalBall');
const statusLabel = document.getElementById('statusLabel');
const statusText  = document.getElementById('statusText');
const responseArea= document.getElementById('responseArea');
const speakBtn    = document.getElementById('speakBtn');
const btnHint     = document.getElementById('btnHint');
const volMeter    = document.getElementById('volMeter');
const changeKey   = document.getElementById('changeKey');
const toast       = document.getElementById('toast');

// ── API Key Setup ─────────────────────────────
const savedKey = localStorage.getItem('zara_key') || '';
if (savedKey) { apiKeyInput.value = savedKey; }

beginBtn.addEventListener('click', () => {
  const key = apiKeyInput.value.trim();
  if (!key || !key.startsWith('AIza')) {
    showToast('That doesn\'t look like a valid Gemini API key...');
    return;
  }
  apiKey = key;
  localStorage.setItem('zara_key', key);
  apiSetup.style.display = 'none';
  mainUI.style.display = 'flex';
  initSession();
});

apiKeyInput.addEventListener('keydown', e => { if (e.key === 'Enter') beginBtn.click(); });

changeKey.addEventListener('click', () => {
  if (ws) { try { ws.close(); } catch(e){} ws = null; }
  sessionReady = false;
  apiSetup.style.display = 'flex';
  mainUI.style.display = 'none';
});

// ── Audio Player ──────────────────────────────
class GeminiAudioPlayer {
  constructor() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
    this.nextTime = 0;
    this.playing = false;
  }

  resume() { if (this.ctx.state === 'suspended') this.ctx.resume(); }

  enqueue(b64) {
    this.resume();
    try {
      const raw = atob(b64);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);

      const i16 = new Int16Array(bytes.buffer);
      const f32 = new Float32Array(i16.length);
      for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;

      const buf = this.ctx.createBuffer(1, f32.length, 24000);
      buf.copyToChannel(f32, 0);
      const src = this.ctx.createBufferSource();
      src.buffer = buf;
      src.connect(this.ctx.destination);
      const start = Math.max(this.ctx.currentTime + 0.05, this.nextTime);
      src.start(start);
      this.nextTime = start + buf.duration;
      this.playing = true;
      src.onended = () => {
        if (this.nextTime <= this.ctx.currentTime + 0.1) this.playing = false;
      };
    } catch(e) { console.error('Audio decode error', e); }
  }

  reset() { this.nextTime = 0; this.playing = false; }
}

// ── b64 helpers ───────────────────────────────
function bufToB64(buf) {
  const bytes = new Uint8Array(buf);
  let str = '';
  const chunk = 8192;
  for (let i = 0; i < bytes.length; i += chunk)
    str += String.fromCharCode(...bytes.subarray(i, i + chunk));
  return btoa(str);
}

function f32ToI16Buffer(f32) {
  const i16 = new Int16Array(f32.length);
  for (let i = 0; i < f32.length; i++)
    i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32768));
  return i16.buffer;
}

// ── WebSocket Session ─────────────────────────
function initSession() {
  setState('connecting');

  if (ws) { try { ws.close(); } catch(e){} }
  sessionReady = false;

  const url = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${apiKey}`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    const setup = {
      setup: {
        model: GEMINI_MODEL,
        generationConfig: {
          responseModalities: ['AUDIO'],
          speechConfig: {
            voiceConfig: {
              prebuiltVoiceConfig: { voiceName: 'Kore' }
            }
          }
        },
        systemInstruction: {
          parts: [{ text: SNARKY_PROMPT }]
        }
      }
    };
    ws.send(JSON.stringify(setup));
  };

  ws.onmessage = async (evt) => {
    let data;
    try {
      const text = evt.data instanceof Blob ? await evt.data.text() : evt.data;
      data = JSON.parse(text);
    } catch(e) { return; }

    if (data.setupComplete !== undefined) {
      sessionReady = true;
      setState('ready');
      return;
    }

    if (data.serverContent) {
      const sc = data.serverContent;

      if (sc.modelTurn?.parts) {
        for (const part of sc.modelTurn.parts) {
          if (part.inlineData?.data) {
            if (!audioPlayer) audioPlayer = new GeminiAudioPlayer();
            audioPlayer.resume();
            audioPlayer.enqueue(part.inlineData.data);
            setState('speaking');
          }
          if (part.text) {
            lastResponse = part.text;
            showResponse(part.text);
          }
        }
      }

      if (sc.turnComplete) {
        setTimeout(() => {
          if (!isRecording) setState('ready');
        }, 800);
      }
    }

    if (data.error) {
      showToast('The spirits report: ' + (data.error.message || 'unknown cosmic error'));
      setState('ready');
    }
  };

  ws.onerror = (e) => {
    console.error('WebSocket error:', e);
    showToast('The crystal ball has lost its connection to the beyond...');
    setState('ready');
    sessionReady = false;
  };

  ws.onclose = (e) => {
    sessionReady = false;
    console.log("WebSocket closed:", e.code, e.reason);
    if (e.code !== 1000) {
      showToast(`Connection severed (${e.code}: ${e.reason || "no reason"}). The spirits are dramatic today.`);
      setState('disconnected');
      setTimeout(initSession, 3000);
    }
  };
}

// ── Recording ─────────────────────────────────
async function startRecording() {
  if (!sessionReady || isRecording) return;

  try {
    if (!audioPlayer) audioPlayer = new GeminiAudioPlayer();
    audioPlayer.resume();
    audioPlayer.reset();

    micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 }});
    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    const src = audioContext.createMediaStreamSource(micStream);
    scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);

    scriptProcessor.onaudioprocess = (e) => {
      if (!isRecording || !ws || ws.readyState !== WebSocket.OPEN) return;
      const f32 = e.inputBuffer.getChannelData(0);
      const i16buf = f32ToI16Buffer(f32);
      const b64 = bufToB64(i16buf);
      ws.send(JSON.stringify({
        realtimeInput: {
          mediaChunks: [{ mimeType: 'audio/pcm;rate=16000', data: b64 }]
        }
      }));
    };

    src.connect(scriptProcessor);
    scriptProcessor.connect(audioContext.destination);
    isRecording = true;
    setState('listening');
  } catch(e) {
    showToast('Microphone access denied. The spirits cannot hear you.');
    console.error(e);
  }
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;

  if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioContext) { audioContext.close(); audioContext = null; }

  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ clientContent: { turnComplete: true } }));
    setState('thinking');
  }
}

// ── Button events ─────────────────────────────
speakBtn.addEventListener('mousedown', e => { e.preventDefault(); if (sessionReady) { speakBtn.classList.add('pressed'); startRecording(); } });
speakBtn.addEventListener('mouseup', () => { speakBtn.classList.remove('pressed'); stopRecording(); });
speakBtn.addEventListener('mouseleave', () => { if (isRecording) { speakBtn.classList.remove('pressed'); stopRecording(); } });
speakBtn.addEventListener('touchstart', e => { e.preventDefault(); if (sessionReady) { speakBtn.classList.add('pressed'); startRecording(); } }, { passive: false });
speakBtn.addEventListener('touchend', e => { e.preventDefault(); speakBtn.classList.remove('pressed'); stopRecording(); }, { passive: false });

// ── State Machine ─────────────────────────────
const STATES = {
  connecting: {
    label: 'opening the veil',
    text: 'Consulting the spirits... they are slow today.',
    ball: '', btn: false, vol: false
  },
  ready: {
    label: 'awaiting mortal inquiry',
    text: 'Hold the orb and ask your question, if you must.',
    ball: '', btn: true, vol: false
  },
  listening: {
    label: 'enduring your question',
    text: 'Yes, yes, I\'m listening. Unfortunately.',
    ball: 'listening', btn: true, vol: true
  },
  thinking: {
    label: 'gazing into the void',
    text: 'The crystal stirs... the spirits are judging you.',
    ball: 'thinking', btn: false, vol: false
  },
  speaking: {
    label: 'the oracle speaks',
    text: 'Madam Zara has deemed you worthy of an answer.',
    ball: 'speaking', btn: false, vol: false
  },
  disconnected: {
    label: 'cosmic interference',
    text: 'Reconnecting to the beyond...',
    ball: '', btn: false, vol: false
  }
};

function setState(state) {
  const s = STATES[state];
  if (!s) return;
  statusLabel.textContent = s.label;
  statusText.textContent = s.text;
  crystalBall.className = 'crystal-ball' + (s.ball ? ' ' + s.ball : '');
  speakBtn.disabled = !s.btn;
  speakBtn.style.opacity = s.btn ? '1' : '0.5';
  speakBtn.style.cursor = s.btn ? 'pointer' : 'not-allowed';
  btnHint.textContent = state === 'listening' ? 'release to send' : 'hold to speak';
  volMeter.classList.toggle('active', s.vol);
}

function showResponse(text) {
  responseArea.textContent = text;
  responseArea.classList.add('visible');
}

function showToast(msg) {
  toast.textContent = msg;
  toast.className = 'toast show';
  setTimeout(() => toast.className = 'toast', 4200);
}

setState('connecting');
</script>
